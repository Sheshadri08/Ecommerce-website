<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaCart | Smart Shopping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand-wrap">
        <span class="brand-dot"></span>
        <div>
          <h1>NovaCart</h1>
          <p class="header-subtitle">Modern commerce, simplified</p>
        </div>
      </div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search products, categories, brands..." />
      </div>
      <div class="header-actions">
        <select id="sortSelect" aria-label="Sort products">
          <option value="featured">Newest</option>
          <option value="rating">Top Rated</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A-Z</option>
        </select>
        <a class="ghost-link" href="/admin">Admin Panel</a>
        <a class="cart-link" href="cart.html">Cart <span id="cartCount">0</span></a>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <div>
          <p class="hero-tag">Fresh arrivals</p>
          <h2>Curated tech, style, home, and fitness picks powered by a live catalog.</h2>
          <p>
            Browse MongoDB-backed inventory, add to cart instantly, and check out with a clean
            storefront flow.
          </p>
        </div>
        <div class="hero-stat-grid">
          <article>
            <strong id="heroProductCount">0</strong>
            <span>Products</span>
          </article>
          <article>
            <strong id="heroCategoryCount">0</strong>
            <span>Categories</span>
          </article>
          <article>
            <strong>24h</strong>
            <span>Dispatch target</span>
          </article>
        </div>
      </div>
    </section>

    <main class="main-content">
      <div id="categoryChips" class="chips"></div>
      <div class="toolbar">
        <p id="resultsInfo" class="results-info"></p>
        <p id="statusMessage" class="status-text"></p>
      </div>
      <section id="productGrid" class="product-grid"></section>
    </main>

    <template id="productTemplate">
      <article class="product-card">
        <div class="card-image-wrap">
          <span class="badge"></span>
          <img alt="" loading="lazy" />
        </div>
        <div class="card-body">
          <div class="card-topline">
            <p class="category"></p>
            <span class="inventory-pill"></span>
          </div>
          <h3></h3>
          <p class="description"></p>
          <div class="card-meta">
            <span class="rating"></span>
            <strong class="price"></strong>
          </div>
          <button type="button" class="add-btn">Add to Cart</button>
        </div>
      </article>
    </template>

    <script src="order.js"></script>
  </body>
</html>
